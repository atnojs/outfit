<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cambio de Outfit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="https://atnojs.es/iconos/favicon1.ico" type="image/x-icon" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="app" class="min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="main-grid max-w-7xl mx-auto">
    <aside class="control-panel p-6 flex flex-col gap-6 overflow-y-auto">
    <header class="text-center">
    <h1 class="app-title">Cambio de Outfit</h1>
    <p class="text-sm text-secondary mt-1">Sube una foto y reinventa el estilo.</p>
    </header>

    <div>
    <h2 class="section-title mb-3">1. Sube tu Foto</h2>
    <div id="drag-area" class="drag-area p-6 text-center cursor-pointer">
    <input type="file" id="file-input" class="hidden" accept="image/*" />
    <div id="upload-placeholder">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
    <p class="mt-2 text-sm text-secondary">Arrastra y suelta una imagen o <span class="font-semibold text-accent">haz click</span></p>
    </div>
    <img id="uploaded-image-preview" src="" class="hidden max-h-28 mx-auto rounded-md" alt="Uploaded Preview" />
    </div>
    </div>

    <div>
    <h2 class="section-title mb-3">2. Elige un Estilo</h2>
    <div id="category-container" class="grid grid-cols-3 sm:grid-cols-4 gap-3"></div>
    <div id="subcategory-container" class="mt-4 flex flex-wrap gap-2"></div>
    </div>
    
    <div>
    <h2 class="section-title mb-3">3. Personaliza</h2>
    <div class="space-y-4">
    <div class="relative">
    <textarea id="custom-prompt" class="w-full input-glass border rounded-md px-3 py-2 text-sm focus:outline-none pr-20 resize-none" rows="3" placeholder="Ej: vestido rojo con flores."></textarea>
    <div class="absolute right-2 bottom-2 flex items-center space-x-2">
    <button id="enhance-prompt-btn" class="icon-btn text-lg" title="Mejorar descripción con IA">
    <span id="enhance-prompt-icon">🪄</span>
    <div id="enhance-prompt-spinner" class="spinner hidden"></div>
    </button>
    <button id="idea-generator-btn" class="icon-btn text-lg" title="Generar idea de outfit">
    <span id="idea-generator-icon">✨</span>
    <div id="idea-generator-spinner" class="spinner hidden"></div>
    </button>
    </div>
    </div>
    
    <div>
    <label for="intensity-slider" class="text-sm font-medium text-secondary">Intensidad del cambio: <span id="intensity-value" class="font-bold text-accent">50</span>%</label>
    <input id="intensity-slider" type="range" min="10" max="100" value="50" class="w-full h-2 mt-2">
    </div>

    <div class="flex items-center">
    <input id="keep-colors-checkbox" type="checkbox" class="checkbox-ui">
    <label for="keep-colors-checkbox" class="ml-2 block text-sm text-secondary">Mantener colores originales</label>
    </div>

    <div class="flex items-center">
    <input id="change-background-checkbox" type="checkbox" class="checkbox-ui">
    <label for="change-background-checkbox" class="ml-2 block text-sm text-secondary">Cambiar también el fondo</label>
    </div>
    <div class="flex items-center">
    <input id="change-pose-checkbox" type="checkbox" class="checkbox-ui">
    <label for="change-pose-checkbox" class="ml-2 block text-sm text-secondary">Modificar la postura</label>
    </div>
    </div>
    </div>

    <div class="mt-auto pt-4 border-t border-glass space-y-3 action-group">
    <button id="generate-btn" class="btn-primary w-full py-3 px-4 rounded-lg flex items-center justify-center transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
    <span id="generate-btn-text">Generar Outfit</span>
    <div id="loader" class="loader hidden ml-2"></div>
    </button>
    <button id="random-btn" class="btn-secondary w-full py-2 px-4 rounded-lg transition-all duration-200">
    ✨ ¡Sorpréndeme!
    </button>
    </div>
    </aside>

    <main class="flex flex-col gap-6">
    <div id="image-viewer" class="viewer-glass w-full h-[60vh] max-h-[600px] rounded-xl flex items-center justify-center p-4">
    <div id="viewer-placeholder" class="text-center text-secondary">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mx-auto opacity-50"><path d="M15.5 2H8.6c-.4 0-.8.2-1.1.5-.3.3-.5.7-.5 1.1v12.8c0 .4.2.8.5 1.1.3.3.7.5 1.1.5h9.8c.4 0 .8-.2 1.1-.5.3-.3.5-.7.5-1.1V6.5L15.5 2z"/><path d="M3 7.6v12.8c0 .4.2.8.5 1.1.3.3.7.5 1.1.5h9.8"/><path d="M15 2v5h5"/></svg>
    <p class="mt-4 font-light">La imagen generada aparecerá aquí</p>
    </div>
    <div id="comparison-container" class="comparison-container w-full h-full hidden">
    <img id="image-before" src="" alt="Original" class="w-full h-full object-contain">
    <img id="image-after" src="" alt="Generated" class="comparison-image-after">
    <div id="comparison-slider" class="comparison-slider">
    <div class="comparison-slider-handle">
    <span class="slider-arrow">&lt;</span><span class="slider-arrow">&gt;</span>
    </div>
    </div>
    </div>
    </div>

    <div class="flex items-center justify-end">
    <button id="download-btn" class="btn-success font-bold py-2 px-5 rounded-lg flex items-center gap-2 transition-all duration-200 hidden">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
    Descargar
    </button>
    </div>

    <div id="style-description-section" class="hidden">
    <button id="describe-style-btn" class="btn-outline w-full py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-all duration-200">
    <span id="describe-btn-text">✨ Describe mi Estilo</span>
    <div id="describe-loader" class="loader hidden"></div>
    </button>
    <div id="style-description-output" class="mt-4 p-4 rounded-lg text-secondary text-sm italic hidden glass-box"></div>
    </div>

    <div id="history-section" class="hidden">
    <h2 class="section-title mb-3">Historial Reciente</h2>
    <div id="history-container" class="grid grid-cols-5 md:grid-cols-10 gap-2"></div>
    </div>
    </main>
    </div>
    <div id="toast" class="fixed bottom-5 right-5 text-white py-2 px-5 rounded-lg shadow-lg opacity-0 translate-y-3 transition-all duration-300">
    <p id="toast-message"></p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
